<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABSENSI UPTD PSDA WS CITANDUY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .btn-primary { background: #005a32; transition: all 0.3s; }
        .btn-primary:hover { background: #004426; transform: translateY(-2px); }
        .loading { display: none; }
    </style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">E-ABSENSI</h1>
            <p class="text-sm text-gray-500 font-medium uppercase tracking-widest">UPTD PSDA WS CITANDUY</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-400 mb-1 ml-1 uppercase">NIP Pegawai</label>
                <input type="number" id="nip" placeholder="Masukkan NIP..." class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-green-600 outline-none transition-all">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 mb-1 ml-1 uppercase">Nama Lengkap</label>
                <input type="text" id="nama" placeholder="Nama sesuai SK..." class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-green-600 outline-none transition-all">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 mb-1 ml-1 uppercase">Jabatan</label>
                <select id="jabatan" class="w-full p-4 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-green-600 outline-none transition-all">
                    <option value="">-- Pilih Jabatan --</option>
                    <option value="Kepala UPTD">Kepala UPTD</option>
                    <option value="Kasubag TU">Kasubag TU</option>
                    <option value="Kasi">Kasi</option>
                    <option value="Staf">Staf</option>
                    <option value="Petugas Lapangan">Petugas Lapangan</option>
                </select>
            </div>

            <div class="pt-2">
                <label class="block text-xs font-bold text-gray-400 mb-2 ml-1 uppercase">Foto Bukti (Selfie)</label>
                <input type="file" id="foto" accept="image/*" capture="user" class="block w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:border-0 file:text-sm file:font-bold file:bg-green-50 file:text-green-700 hover:file:bg-green-100 cursor-pointer">
            </div>

            <div class="grid grid-cols-2 gap-4 mt-6">
                <button onclick="prosesAbsen('Masuk')" id="btn-masuk" class="btn-primary text-white p-4 rounded-2xl font-bold shadow-lg shadow-green-900/20">ABSEN MASUK</button>
                <button onclick="prosesAbsen('Pulang')" id="btn-pulang" class="bg-gray-800 text-white p-4 rounded-2xl font-bold hover:bg-black transition-all shadow-lg">ABSEN PULANG</button>
            </div>
        </div>

        <div id="loader" class="loading mt-4 text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-green-600 border-t-transparent"></div>
            <p class="text-xs font-bold text-green-700 mt-2">Sedang memproses...</p>
        </div>
    </div>

    <script>
        const SB_URL = 'https://cktrzythksyayhbxdxdn.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrdHJ6eXRoa3N5YXloYnhkeGRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTY5NTMsImV4cCI6MjA5MDA3Mjk1M30.hj1NaPkhmPJJ7gCJ5Q-gQTpueWXiNmxVhGz-x5-81QQ';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function prosesAbsen(tipe) {
            const nip = document.getElementById('nip').value;
            const nama = document.getElementById('nama').value;
            const jabatan = document.getElementById('jabatan').value;
            const fotoFile = document.getElementById('foto').files[0];
            const loader = document.getElementById('loader');

            if (!nip || !nama || !jabatan || !fotoFile) {
                return alert('⚠️ Lengkapi data dan foto dulu ya!');
            }

            loader.style.display = 'block';

            try {
                // 1. Upload Foto
                const fileName = `${Date.now()}_${nip}.jpg`;
                const { data: upData, error: upError } = await supabaseClient.storage
                    .from('foto-absen')
                    .upload(fileName, fotoFile);

                if (upError) throw upError;

                const { data: urlData } = supabaseClient.storage
                    .from('foto-absen')
                    .getPublicUrl(fileName);

                // 2. Ambil Lokasi (GPS)
                let lokasiStr = "Tidak diizinkan";
                try {
                    const pos = await new Promise((res, rej) => {
                        navigator.geolocation.getCurrentPosition(res, rej, {timeout: 5000});
                    });
                    lokasiStr = `${pos.coords.latitude},${pos.coords.longitude}`;
                } catch (e) { console.log("GPS Error"); }

                const sekarang = new Date();
                const jamSekarang = sekarang.toLocaleTimeString('id-ID', { hour12: false });
                const tglSekarang = sekarang.toISOString().split('T')[0];

                // 3. Simpan ke Tabel
                const dataAbsen = {
                    nip, nama, jabatan, lokasi: lokasiStr, foto_url: urlData.publicUrl, tanggal: tglSekarang
                };

                if (tipe === 'Masuk') {
                    dataAbsen.jam_masuk = jamSekarang;
                    dataAbsen.status = 'DI KANTOR';
                    const { error: insError } = await supabaseClient.from('laporan_absen').insert([dataAbsen]);
                    if (insError) throw insError;
                } else {
                    const { error: updError } = await supabaseClient.from('laporan_absen')
                        .update({ jam_pulang: jamSekarang, status: 'SELESAI' })
                        .eq('nip', nip)
                        .eq('tanggal', tglSekarang);
                    if (updError) throw updError;
                }

                alert(`✅ Berhasil Absen ${tipe}!`);
                location.reload();

            } catch (err) {
                console.error(err);
                alert('❌ Gagal: ' + err.message);
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
