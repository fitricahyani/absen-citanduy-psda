<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Absensi UPTD Citanduy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a503a 0%, #1e3c72 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .main-card {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 450px;
            position: relative;
            overflow: hidden; 
        }

        .main-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 8px; 
            background: #2ecc71;
            z-index: 10;
        }

        .logo-container { text-align: center; margin-top: 10px; margin-bottom: 10px; }
        .logo-img { 
            max-width: 70px; 
            height: auto; 
            display: block;
            margin: 0 auto;
        }
        
        .header-text { text-align: center; margin-bottom: 20px; }
        .header-text h5 { font-weight: 800; color: #2d3436; margin: 0; font-size: 1.1rem; }
        .header-text p { font-weight: 700; color: #27ae60; font-size: 0.75rem; margin: 0; text-transform: uppercase; }

        #clock { 
            font-size: 1.4rem; 
            font-weight: 700; 
            background: #f1f2f6; 
            color: #2f3542; 
            padding: 8px 20px; 
            border-radius: 12px; 
            display: inline-block;
            margin: 10px 0;
        }

        .form-label { font-size: 0.75rem; font-weight: 700; color: #2d3436; text-transform: uppercase; margin-bottom: 5px; }
        .form-control, .form-select { 
            border-radius: 10px; 
            padding: 12px; 
            background-color: #f8f9fa; 
            border: 1px solid #eee; 
            font-size: 14px; 
        }

        .btn-absensi { 
            border-radius: 15px; 
            padding: 15px; 
            font-weight: 700; 
            text-transform: uppercase; 
            width: 100%; 
            font-size: 14px; 
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .btn-masuk { 
            background: #2ecc71; 
            color: white; 
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
            margin-bottom: 15px;
        }

        .btn-pulang { 
            background: white; 
            color: #e74c3c; 
            border: 2px solid #e74c3c; 
        }

        .btn-absensi:active { transform: scale(0.98); }

        .loading-overlay { 
            display: none; 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.9); 
            z-index: 100; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column; 
        }
    </style>
</head>
<body>

<div class="main-card">
    <div id="loader" class="loading-overlay">
        <div class="spinner-border text-success mb-2"></div>
        <small class="fw-bold">Sedang Mengirim...</small>
    </div>

    <div class="logo-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Logo_Provinsi_Jawa_Barat.png/600px-Logo_Provinsi_Jawa_Barat.png" alt="Logo Jabar" class="logo-img">
    </div>

    <div class="header-text">
        <h5>DINAS SUMBER DAYA AIR</h5>
        <p>UPTD PSDA WILAYAH SUNGAI CITANDUY</p>
        <hr style="margin: 15px 0;">
        <div id="greeting" class="text-secondary small fw-bold">Selamat Pagi</div>
        <div id="clock">00:00:00</div>
    </div>

    <form id="absenForm">
        <div class="mb-3">
            <label class="form-label">NIP Pegawai</label>
            <input type="text" id="nip" class="form-control" placeholder="198XXXXXXXX" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Nama Lengkap</label>
            <input type="text" id="nama" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Jabatan</label>
            <select id="jabatan" class="form-select" required>
                <option value="" selected disabled>-- Pilih Jabatan --</option>
                <option value="Pengadministrasi Perkantoran">Pengadministrasi Perkantoran</option>
                <option value="Pengolah Data dan Informasi">Pengolah Data dan Informasi</option>
                <option value="Penata Layanan Operasional">Penata Layanan Operasional</option>
                <option value="Tenaga Teknis Sumber Daya Air">Tenaga Teknis Sumber Daya Air</option>
                <option value="Operator Layanan Operasional">Operator Layanan Operasional</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="form-label">Foto Selfie</label>
            <input type="file" id="foto" class="form-control" accept="image/*" capture="user">
        </div>

        <button type="button" onclick="kirimData('Masuk')" class="btn btn-absensi btn-masuk">
            <i class="fas fa-camera"></i> Absen Masuk Sekarang
        </button>

        <button type="button" onclick="kirimData('Pulang')" class="btn btn-absensi btn-pulang">
            <i class="fas fa-home"></i> Absen Pulang
        </button>
        
        <div class="text-center mt-3">
            <small class="text-success fw-bold" style="font-size: 10px;">
                <i class="fas fa-check-circle"></i> Waktu Real-time Aktif (Batas 07:30)
            </small>
        </div>
    </form>
</div>

<script>
    // Konfigurasi Supabase
    const SUPABASE_URL = 'https://cktrzythksyayhbxdxdn.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrdHJ6eXRoa3N5YXloYnhkeGRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTY5NTMsImV4cCI6MjA5MDA3Mjk1M30.hj1NaPkhmPJJ7gCJ5Q-gQTpueWXiNmxVhGz-x5-81QQ'; 
    const { createClient } = supabase;
    const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
    const TABEL = 'laporan_absen';

    function updateWaktu() {
        const sekarang = new Date();
        const jam = String(sekarang.getHours()).padStart(2, '0');
        const menit = String(sekarang.getMinutes()).padStart(2, '0');
        const detik = String(sekarang.getSeconds()).padStart(2, '0');
        document.getElementById('clock').innerText = `${jam}:${menit}:${detik}`;

        const g = document.getElementById('greeting');
        const h = sekarang.getHours();
        if (h < 11) g.innerText = "Selamat Pagi";
        else if (h < 15) g.innerText = "Selamat Siang";
        else if (h < 18) g.innerText = "Selamat Sore";
        else g.innerText = "Selamat Malam";
    }
    setInterval(updateWaktu, 1000);
    updateWaktu();

    async function kirimData(status) {
        const nip = document.getElementById('nip').value.trim();
        const nama = document.getElementById('nama').value;
        const jabatan = document.getElementById('jabatan').value;
        const fotoInput = document.getElementById('foto');
        const fotoFile = fotoInput.files[0];

        if(!nip || !nama || !jabatan) return alert("Lengkapi data dulu!");

        const sekarang = new Date();
        const jamSekarang = sekarang.getHours();
        const menitSekarang = sekarang.getMinutes();
        const tgl = sekarang.toISOString().split('T')[0];
        const jamMenitString = `${String(jamSekarang).padStart(2, '0')}:${String(menitSekarang).padStart(2, '0')}`;

        if(status === 'Pulang' && jamSekarang < 16) {
            return alert("Belum waktunya pulang! Minimal jam 16:00.");
        }

        document.getElementById('loader').style.display = 'flex';

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const loc = `${pos.coords.latitude}, ${pos.coords.longitude}`;

            try {
                if(status === 'Masuk') {
                    const { data: cekAda } = await _supabase.from(TABEL).select('id').eq('nip', nip).eq('tanggal', tgl).maybeSingle();
                    if(cekAda) {
                        alert("Anda sudah absen masuk hari ini!");
                        document.getElementById('loader').style.display = 'none';
                        return;
                    }

                    let statusKehadiran = (jamSekarang > 7 || (jamSekarang === 7 && menitSekarang > 30)) ? 'Terlambat' : 'Hadir';

                    let urlFoto = "";
                    if(fotoFile) {
                        const fileName = `${Date.now()}_${nip}.jpg`;
                        const { error: uploadError } = await _supabase.storage.from('foto-absen').upload(fileName, fotoFile);
                        if (uploadError) throw uploadError;

                        const { data: publicUrlData } = _supabase.storage.from('foto-absen').getPublicUrl(fileName);
                        urlFoto = publicUrlData.publicUrl;
                    }

                    const { error: insertError } = await _supabase.from(TABEL).insert([{ 
                        nip, nama, jabatan, tanggal: tgl, 
                        jam_masuk: jamMenitString, status: statusKehadiran, 
                        lokasi: loc, foto_url: urlFoto 
                    }]);

                    if (insertError) throw insertError;
                    alert(statusKehadiran === 'Terlambat' ? "Absen Berhasil (Anda Terlambat!)" : "Absen Masuk Berhasil!");

                } else {
                    const { data: dataMasuk } = await _supabase
                        .from(TABEL)
                        .select('id')
                        .eq('nip', nip)
                        .eq('tanggal', tgl)
                        .maybeSingle();

                    if(!dataMasuk) {
                        alert("Data masuk hari ini tidak ditemukan!");
                        document.getElementById('loader').style.display = 'none';
                        return;
                    }

                    const { error: updateError } = await _supabase
                        .from(TABEL)
                        .update({ jam_pulang: jamMenitString })
                        .eq('id', dataMasuk.id);

                    if (updateError) throw updateError;
                    alert("Absen Pulang Berhasil!");
                }
                location.reload();
            } catch (e) { 
                console.error(e);
                alert("Error: " + e.message); 
            } finally { 
                document.getElementById('loader').style.display = 'none'; 
            }
        }, (error) => {
            alert("Harap aktifkan GPS untuk absen!");
            document.getElementById('loader').style.display = 'none';
        });
    }
</script>
</body>
</html>
